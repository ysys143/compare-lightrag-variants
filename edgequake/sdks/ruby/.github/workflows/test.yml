name: Ruby SDK Tests

on:
    push:
        paths: ["sdks/ruby/**"]
    pull_request:
        paths: ["sdks/ruby/**"]

defaults:
    run:
        working-directory: sdks/ruby

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                ruby: ["3.0", "3.1", "3.2", "3.3"]
        steps:
            - uses: actions/checkout@v4
            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: ${{ matrix.ruby }}
                  bundler-cache: true
                  working-directory: sdks/ruby
            - run: ruby -Ilib -Itest test/unit_test.rb
