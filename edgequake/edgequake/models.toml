# EdgeQuake Models Configuration
# ================================
# This file defines LLM and embedding providers and their model cards.
# Model cards describe capabilities, costs, and metadata for each model.
#
# Configuration priority (first found wins):
#   1. EDGEQUAKE_MODELS_CONFIG environment variable (path to config file)
#   2. ./models.toml (current working directory)
#   3. ~/.edgequake/models.toml (user home directory)
#   4. Built-in defaults (bundled in the binary)
#
# Environment variable overrides:
#   - OPENAI_API_KEY: Required for OpenAI provider
#   - OLLAMA_BASE_URL: Override Ollama API endpoint (default: http://localhost:11434)
#   - LM_STUDIO_BASE_URL: Override LM Studio endpoint (default: http://localhost:1234)

# =============================================================================
# DEFAULT SELECTIONS
# =============================================================================
# Define which provider and model to use by default for LLM and embedding tasks.
# These are used when no explicit provider/model is specified in API calls.
#
# Supported default configurations:
#   - OpenAI: gpt-4.1-nano (LLM), text-embedding-3-small (embedding)
#   - Anthropic: claude-sonnet-4-5-20250929 (LLM)
#   - Gemini: gemini-2.5-flash (LLM), gemini-embedding-001 (embedding)
#   - xAI: grok-4-1-fast (LLM)
#   - OpenRouter: openai/gpt-4o-mini (LLM)
#   - Ollama: gemma3:12b (LLM), embeddinggemma (embedding)
#   - LM Studio: gemma-3n-e4b-it (LLM), text-embedding-nomic-embed-text-v1.5 (embedding)

[defaults]
llm_provider = "ollama"              # Default LLM provider
llm_model = "gemma3:12b"             # Default LLM model (128K context, vision support)
embedding_provider = "ollama"        # Default embedding provider
embedding_model = "embeddinggemma"   # Default embedding model (768 dimensions, 2K context)

# =============================================================================
# OPENAI PROVIDER
# =============================================================================
# Production-grade OpenAI API integration
# Requires: OPENAI_API_KEY environment variable

[[providers]]
name = "openai"
display_name = "OpenAI"
type = "openai"
api_base = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
enabled = true
priority = 10
description = "OpenAI GPT models - Production-grade LLMs with excellent instruction following"

