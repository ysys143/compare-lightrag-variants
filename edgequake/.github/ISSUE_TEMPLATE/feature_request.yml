name: "Feature request"
description: "Suggest an idea for this project."
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature!
  - type: input
    id: title
    attributes:
      label: "Feature Title"
      description: "A short, descriptive title for the feature."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Describe the feature"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "Why is this feature important to you?"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Have you considered any alternatives?"
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Add any other context or screenshots about the feature request here."
    validations:
      required: false
